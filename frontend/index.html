<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL — Node Hierarchy Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #2a2a35;
      --accent: #6ee7b7;
      --accent2: #a78bfa;
      --accent3: #f59e0b;
      --danger: #f87171;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(110,231,183,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110,231,183,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    
    header {
      margin-bottom: 48px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: rgba(110,231,183,0.08);
      border: 1px solid rgba(110,231,183,0.2);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 16px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: var(--mono);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
    }

    
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .input-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder { color: var(--muted); }

    .url-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    .url-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus { border-color: var(--accent2); color: var(--text); }

    .btn {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
    }

    .btn-primary:hover { background: #86efcc; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    
    .error-box {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--danger);
      font-family: var(--mono);
      font-size: 13px;
      margin-bottom: 24px;
      display: none;
    }

    .error-box.visible { display: block; }

    
    .loader {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }
    .loader.visible { display: flex; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    
    #results { display: none; }
    #results.visible { display: block; }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    
    .identity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .id-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .id-card .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .id-card .value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent2);
    }

    
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .stat-num {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid;
    }

    .tag-invalid {
      color: var(--danger);
      background: rgba(248,113,113,0.08);
      border-color: rgba(248,113,113,0.3);
    }

    .tag-dup {
      color: var(--accent3);
      background: rgba(245,158,11,0.08);
      border-color: rgba(245,158,11,0.3);
    }

    
    .hierarchies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    /* Prevent cards from becoming too wide on large screens with few items */
    @media (min-width: 800px) {
      .hierarchies-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        max-width: 100%;
      }
    }

    /* On narrow screens stack cards fully */
    @media (max-width: 480px) {
      .hierarchies-grid {
        grid-template-columns: 1fr;
      }
    }

    .hier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .hier-card:hover { border-color: var(--accent); }

    .hier-card.cyclic { border-color: rgba(248,113,113,0.3); }
    .hier-card.cyclic:hover { border-color: var(--danger); }

    .hier-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .hier-root {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .hier-card.cyclic .hier-root { color: var(--danger); }

    .hier-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .chip-depth {
      background: rgba(110,231,183,0.1);
      color: var(--accent);
      border: 1px solid rgba(110,231,183,0.2);
    }

    .chip-cycle {
      background: rgba(248,113,113,0.1);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.2);
    }

    .hier-body {
      padding: 16px;
    }

    
    .tree-view {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.8;
    }

    .tree-node {
      position: relative;
    }

    .tree-node-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: default;
      transition: background 0.15s;
    }

    .tree-node-label:hover { background: rgba(110,231,183,0.08); }

    .tree-node-label .node-char {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      background: rgba(110,231,183,0.1);
      border: 1px solid rgba(110,231,183,0.25);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }

    .tree-children {
      padding-left: 20px;
      border-left: 1px dashed var(--border);
      margin-left: 10px;
    }

    .cycle-msg {
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }

    
    .raw-toggle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      background: none;
      border: none;
      padding: 4px 0;
    }

    .raw-toggle:hover { color: var(--text); }

    .raw-json {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      display: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .raw-json.visible { display: block; }

    
    .json-key { color: var(--accent2); }
    .json-str { color: var(--accent3); }
    .json-num { color: var(--accent); }
    .json-bool { color: var(--danger); }
    .json-null { color: var(--muted); }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .input-row { flex-direction: column; }
      .url-row { flex-direction: column; }
      .identity-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="badge">POST /bfhl</div>
      <h1>Node <span>Hierarchy</span><br>Explorer</h1>
      <p class="subtitle">Bajaj Finserv Health Limited — Full Stack Challenge</p>
    </header>

    <div class="input-card">
      <label class="input-label">API Endpoint</label>
      <div class="url-row">
        <input class="url-input" id="apiUrl" type="text" value="https://bajaj-finserv-health-limited-assign.vercel.app/bfhl" placeholder="https://your-api.vercel.app/bfhl" />
      </div>

      <label class="input-label">Node Edges (comma or newline separated)</label>
      <div class="input-row">
        <textarea id="inputData" placeholder='A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2, G->H, G->H, G->I'></textarea>
      </div>
      <div class="hint">
        Enter edges like <code style="color:var(--accent);font-family:var(--mono)">A->B, B->C</code>. Separate by comma, space, or newline.
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn btn-primary" id="submitBtn" onclick="submitData()">Run →</button>
        <button class="btn btn-secondary" onclick="loadExample()">Load Example</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div class="loader" id="loader"><div class="spinner"></div> Processing edges…</div>

    <div id="results">
      
      <div class="section-title">Identity</div>
      <div class="identity-grid" id="identityGrid"></div>

      
      <div class="section-title">Summary</div>
      <div class="summary-grid" id="summaryGrid"></div>

      
      <div id="flagsSection"></div>

      
      <div class="section-title">Hierarchies</div>
      <div class="hierarchies-grid" id="hierarchiesGrid"></div>

      
      <div class="section-title">Raw Response</div>
      <button class="raw-toggle" onclick="toggleRaw()">▶ Show JSON</button>
      <pre class="raw-json" id="rawJson"></pre>
    </div>

  </div>

  <script>
    const EXAMPLE = 'A->B, A->C, B->D, C->E, E->F, X->Y, Y->Z, Z->X, P->Q, Q->R, G->H, G->H, G->I, hello, 1->2, A->';

    function loadExample() {
      document.getElementById('inputData').value = EXAMPLE;
    }

    function clearAll() {
      document.getElementById('inputData').value = '';
      document.getElementById('results').classList.remove('visible');
      document.getElementById('errorBox').classList.remove('visible');
    }

    function parseInput(raw) {
      return raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
    }

    async function submitData() {
      const raw = document.getElementById('inputData').value.trim();
      const url = document.getElementById('apiUrl').value.trim();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorBox');
      const loader = document.getElementById('loader');
      const results = document.getElementById('results');

      if (!raw) { showError('Please enter at least one edge.'); return; }
      if (!url) { showError('Please enter the API URL.'); return; }

      err.classList.remove('visible');
      results.classList.remove('visible');
      loader.classList.add('visible');
      btn.disabled = true;

      try {
        const data = parseInput(raw);
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const json = await res.json();
        renderResults(json);
      } catch (e) {
        showError('API call failed: ' + e.message);
      } finally {
        loader.classList.remove('visible');
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = '⚠ ' + msg;
      el.classList.add('visible');
    }

    function renderResults(data) {
      
      document.getElementById('identityGrid').innerHTML = [
        ['user_id', data.user_id],
        ['email_id', data.email_id],
        ['college_roll_number', data.college_roll_number]
      ].map(([k, v]) => `
        <div class="id-card">
          <div class="label">${k}</div>
          <div class="value">${v}</div>
        </div>
      `).join('');

      
      const s = data.summary;
      document.getElementById('summaryGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-num">${s.total_trees}</div>
          <div class="stat-label">Valid Trees</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--danger)">${s.total_cycles}</div>
          <div class="stat-label">Cycles</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--accent2)">${s.largest_tree_root || '—'}</div>
          <div class="stat-label">Deepest Tree Root</div>
        </div>
      `;

      
      let flagsHTML = '';
      if (data.invalid_entries?.length) {
        flagsHTML += `<div class="section-title">Invalid Entries</div>
          <div class="tags-row">${data.invalid_entries.map(e => `<span class="tag tag-invalid">${e || '(empty)'}</span>`).join('')}</div>`;
      }
      if (data.duplicate_edges?.length) {
        flagsHTML += `<div class="section-title">Duplicate Edges</div>
          <div class="tags-row">${data.duplicate_edges.map(e => `<span class="tag tag-dup">${e}</span>`).join('')}</div>`;
      }
      document.getElementById('flagsSection').innerHTML = flagsHTML;

      
      document.getElementById('hierarchiesGrid').innerHTML = data.hierarchies.map(h => {
        const isCyclic = h.has_cycle;
        const depthChip = !isCyclic ? `<span class="chip chip-depth">depth: ${h.depth}</span>` : '';
        const cycleChip = isCyclic ? `<span class="chip chip-cycle">⟳ CYCLE</span>` : '';
        const treeHTML = isCyclic
          ? `<span class="cycle-msg">Cyclic group — no tree structure</span>`
          : renderTree(h.tree);

        return `
          <div class="hier-card ${isCyclic ? 'cyclic' : ''}">
            <div class="hier-header">
              <div class="hier-root">${h.root}</div>
              <div class="hier-meta">${depthChip}${cycleChip}</div>
            </div>
            <div class="hier-body">
              <div class="tree-view">${treeHTML}</div>
            </div>
          </div>
        `;
      }).join('');

      
      document.getElementById('rawJson').innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));
      document.querySelector('.raw-toggle').textContent = '▶ Show JSON';
      document.getElementById('rawJson').classList.remove('visible');

      document.getElementById('results').classList.add('visible');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderTree(obj, depth = 0) {
      if (!obj || typeof obj !== 'object' || Object.keys(obj).length === 0) return '';
      return Object.entries(obj).map(([node, children]) => `
        <div class="tree-node">
          <div class="tree-node-label">
            <span class="node-char">${node}</span>
          </div>
          ${Object.keys(children).length > 0
            ? `<div class="tree-children">${renderTree(children, depth + 1)}</div>`
            : ''}
        </div>
      `).join('');
    }

    function syntaxHighlight(json) {
      return json
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
          let cls = 'json-num';
          if (/^"/.test(m)) cls = /:$/.test(m) ? 'json-key' : 'json-str';
          else if (/true|false/.test(m)) cls = 'json-bool';
          else if (/null/.test(m)) cls = 'json-null';
          return `<span class="${cls}">${m}</span>`;
        });
    }

    function toggleRaw() {
      const el = document.getElementById('rawJson');
      const btn = document.querySelector('.raw-toggle');
      const visible = el.classList.toggle('visible');
      btn.textContent = (visible ? '▼ Hide' : '▶ Show') + ' JSON';
    }

    
    document.getElementById('apiUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitData();
    });
  </script>
</body>
</html>
